<style>
  :root {

    --border: rgba(11,11,11,0.08); --gridline: #e1e0d9;
    --blue: #2a78d6; --aqua: #1baf7a; --yellow: #eda100;
    --green: #008300; --violet: #4a3aa7; --red: #e34948;
    --magenta: #e87ba4; --orange: #eb6834;
    --gse-alto: #2a78d6; --gse-medio-alto: #1baf7a;
    --gse-medio: #eda100; --gse-bajo: #eb6834;
    --gse-ext: #4a3aa7; --gse-na: #898781;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--surface-2); color: var(--text-primary); line-height: 1.5; }
  header { background: var(--surface-1); border-bottom: 1px solid var(--border); padding: 16px 24px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  nav { position: sticky; top: 0; z-index: 100; background: var(--surface-1); border-bottom: 1px solid var(--border); display: flex; padding: 0 24px; height: 44px; }
  nav a { display: flex; align-items: center; padding: 0 16px; font-size: 12px; font-weight: 600; color: var(--text-secondary); text-decoration: none; border-bottom: 2px solid transparent; }
  nav a:hover, nav a.active { color: var(--blue); border-bottom-color: var(--blue); }
  main { max-width: 1160px; margin: 0 auto; padding: 20px 24px 60px; }
  .section { padding-top: 20px; margin-top: 10px; }

  .row { display: flex; gap: 20px; align-items: flex-start; }
  .filters { width: 210px; flex-shrink: 0; padding: 12px; background: var(--surface-1); border: 1px solid var(--border); border-radius: 6px; }
  .filters h4 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); margin: 8px 0 3px; }
  .filters h4:first-child { margin-top: 0; }
  .filters label { display: block; font-size: 11px; padding: 1px 0; cursor: pointer; color: var(--text-secondary); }
  .filters label input { margin-right: 5px; accent-color: var(--blue); }
  .filters button { display: block; width: 100%; margin-top: 6px; padding: 4px 0; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); border-radius: 4px; background: var(--surface-1); color: var(--text-secondary); }
  .filters button:hover { background: var(--surface-2); }
  .filter-summary { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
  .tab-row { display: flex; gap: 4px; margin-bottom: 4px; }
  .tab-btn { flex:1; padding: 4px 0; font-size: 10px; font-weight: 600; border: 1px solid var(--blue); background: var(--surface-1); color: var(--blue); border-radius: 4px; cursor: pointer; }
  .tab-btn.active { background: var(--blue); color: white; }
  .chart { flex: 1; min-width: 600px; position: relative; }
  .chart svg { background: var(--surface-1); border: 1px solid var(--border); border-radius: 6px; cursor: grab; }
  .chart svg:active { cursor: grabbing; }
  .ttip { position: fixed; pointer-events: none; z-index: 200; max-width: 260px; padding: 8px 10px; background: var(--surface-1); border: 1px solid var(--border); border-radius: 6px; font-size: 11px; line-height: 1.5; box-shadow: 0 2px 8px rgba(0,0,0,0.08); opacity: 0; transition: opacity 0.1s; }
  .ttip.on { opacity: 1; }
  .ttip b { color: var(--text-primary); }
  .info-card { margin-top:8px; padding:10px 12px; font-size:11px; line-height:1.55; background:var(--surface-1); border:1px solid var(--border); border-radius:6px; display:none; }
  .info-card b { font-size:12px; color:var(--blue); }
  .info-card table { width:100%; border-collapse:collapse; margin-top:4px; }
  .info-card td { padding:1px 4px; font-size:10px; }
  .info-card td:first-child { color:var(--text-muted); }
  .comm-panel { width:200px; flex-shrink:0; }
  .comm-list { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:8px; }
  .comm-chip { padding:2px 6px; font-size:10px; font-weight:600; border:1px solid var(--border); border-radius:4px; cursor:pointer; background:var(--surface-1); color:var(--text-secondary); white-space:nowrap; }
  .comm-chip:hover { border-color:var(--blue); color:var(--blue); }
  .comm-chip.sel { background:var(--blue); color:white; border-color:var(--blue); }
  .lv-extra { margin-top:12px; display:flex; gap:16px; align-items:flex-start; }
  .lv-extra .comm-list { flex:1; display:flex; flex-wrap:wrap; gap:4px; align-content:flex-start; }
  .lv-extra .info-card { width:280px; flex-shrink:0; margin-top:0; }
  .topic-toggle { cursor:pointer; color:var(--blue); font-size:10px; font-weight:600; margin-top:4px; display:inline-block; }
  .topic-toggle:hover { text-decoration:underline; }
  .topic-full { display:none; font-size:10px; line-height:1.4; max-height:180px; overflow-y:auto; margin-top:4px; padding-top:4px; border-top:1px solid var(--border); }
  .topic-full.open { display:block; }
  footer { text-align: center; padding: 24px; font-size: 11px; color: var(--text-muted); }
  footer a { color: var(--blue); text-decoration: none; }
  @media (max-width: 900px) { .row { flex-direction: column; } .filters { width: 100%; } .chart { min-width: 100%; } }
</style>

    h+='<h4>Algorithm</h4><div class="tab-row"><button class="tab-btn active" data-tab="louvain">Louvain</button><button class="tab-btn" data-tab="leiden">Leiden</button></div>';
  }
  h+='<button class="btn-clear">Clear filters</button><button class="btn-reset">Reset view</button><p class="filter-summary"></p>';
  return h;
}
document.getElementById('f-pr').innerHTML=buildFilters('pr','PageRank',false);
document.getElementById('f-bw').innerHTML=buildFilters('bw','Betweenness',false);
document.getElementById('f-cl').innerHTML=buildFilters('cl','Closeness',false);
document.getElementById('f-lv').innerHTML=buildFilters('lv','PageRank',true);

// Render one section
function render(secId,metricKey,tercileVals){
  const root=document.getElementById(secId);
  const svgEl=document.getElementById('svg-'+secId);
  const ttEl=document.getElementById('tt-'+secId);
  svgEl.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svgEl.style.width='100%';svgEl.style.height=H+'px';
  const svg=d3.select(svgEl);svg.selectAll('*').remove();
  const g=svg.append('g');
  const isLV=secId==='sec-lv';
  let activeTab='louvain';

  // Edges
  g.append('g').selectAll('line').data(LK).join('line')
    .attr('x1',d=>d.source.x0).attr('y1',d=>d.source.y0)
    .attr('x2',d=>d.target.x0).attr('y2',d=>d.target.y0)
    .attr('stroke','#e1e0d9').attr('stroke-width',0.5);

  // Node radius
  function nodeR(d){
    if(isLV) return 4.5;
    const v=d[metricKey]||0.001;
    const min=Math.min(...tercileVals),max=Math.max(...tercileVals);
    return 3+10*(v-min)/(max-min+0.001);
  }
  // Node fill
  function nodeFill(d){
    if(isLV){
      const comId=activeTab==='louvain'?d.louvain:d.leiden;
      const ids=activeTab==='louvain'?lvIds:ldIds;
      const colors=activeTab==='louvain'?lvColors:ldColors;
      const idx=ids.indexOf(comId);
      return idx>=0?colors[idx%colors.length]:'#c3c2b7';
    }
    return gseMap[d.gse]||'#c3c2b7';
  }

  const nodes=g.append('g').selectAll('circle').data(ND).join('circle')
    .attr('cx',d=>d.x0).attr('cy',d=>d.y0)
    .attr('r',d=>nodeR(d))
    .attr('fill',d=>nodeFill(d))
    .attr('fill-opacity',0.75)
    .attr('stroke',d=>d3.color(nodeFill(d)).darker(0.5))
    .attr('stroke-width',0.4).attr('stroke-opacity',0.25)
    .style('cursor','pointer');

  // Tooltip
  const tt=d3.select(ttEl);
  nodes.on('mouseenter',function(e,d){
    const rk=rkPR[d.id]||{},bk=rkBW[d.id]||{},ck=rkCL[d.id]||{};
    let h=`<b>Fellow #${d.id}</b><br>`;
    h+=`Gender: ${d.gender} | GSE: ${d.gse}<br>`;
    h+=`OECD: ${d.oecd}<br>`;
    h+=`Louvain: C${d.louvain} | Leiden: C${d.leiden}<br>`;
    if(d.pagerank)h+=`PageRank: ${d.pagerank.toFixed(4)} (${rk||'—'}/${ND.length})<br>`;
    if(d.betweenness)h+=`Betweenness: ${d.betweenness.toFixed(2)} (${bk||'—'}/${ND.length})<br>`;
    if(d.closeness)h+=`Closeness: ${d.closeness.toFixed(4)} (${ck||'—'}/${ND.length})<br>`;
    if(d.pct_q1)h+=`Q1: ${d.pct_q1}% | Coauthors: ${d.coauthors||0}<br>`;
    if(d.first_author)h+=`1st author: ${d.first_author} (${d.first_author_pct||0}%)<br>`;
    if(TP[d.id])h+=`<span style="color:var(--text-muted)">Topic:</span> ${TP[d.id]}`;
    tt.html(h).classed('on',true);
    if(!isLV||!selectedCom) d3.select(this).attr('fill-opacity',1).attr('stroke-width',1.5).attr('stroke-opacity',0.6);
  }).on('mousemove',function(e){
    const r=ttEl.getBoundingClientRect();
    let x=e.clientX+12,y=e.clientY-10;
    if(x+r.width>window.innerWidth-20)x=e.clientX-r.width-12;
    if(y+r.height>window.innerHeight-20)y=e.clientY-r.height-12;
    tt.style('left',x+'px').style('top',y+'px');
  }).on('mouseleave',function(){
    tt.classed('on',false);
    if(!isLV||!selectedCom){
      d3.select(this).attr('fill-opacity',0.75).attr('stroke-width',0.4).attr('stroke-opacity',0.25);
    } else {
      const d=this.__data__;
      const cid=selectedAlgo==='louvain'?d.louvain:d.leiden;
      if(cid===selectedCom) d3.select(this).attr('fill-opacity',0.95).attr('stroke-width',0.4).attr('stroke-opacity',0.6);
      else d3.select(this).attr('fill-opacity',0.06).attr('stroke-opacity',0.03);
    }
  });

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.3,6]).on('zoom',e=>g.attr('transform',e.transform)));

  // Filters
  function apply(){
    const gens=Array.from(root.querySelectorAll('.fg:checked'),e=>e.value);
    const gses=Array.from(root.querySelectorAll('.fs:checked'),e=>e.value);
    const segs=Array.from(root.querySelectorAll('.ft:checked'),e=>e.value);
    const ocds=Array.from(root.querySelectorAll('.fo:checked'),e=>e.value);
    const any=gens.length+gses.length+segs.length+ocds.length>0;
    let n=0;
    nodes.attr('fill-opacity',d=>{
      const gOk=!gens.length||gens.includes(d.gender);
      const sOk=!gses.length||gses.includes(d.gse);
      const oOk=!ocds.length||ocds.includes(d.oecd);
      let tOk=true;
      if(segs.length&&!isLV){tOk=segs.includes(tercile(tercileVals,d[metricKey]||0));}
      const m=gOk&&sOk&&oOk&&tOk;if(m)n++;
      if(!any)return 0.75;return m?0.9:0.05;
    });
    const sum=root.querySelector('.filter-summary');
    sum.textContent=any?`${n} / ${ND.length} fellows`:`All ${ND.length} fellows`;
  }
  root.querySelectorAll('.fg,.fs,.ft,.fo').forEach(el=>el.addEventListener('change',apply));
  root.querySelector('.btn-clear').addEventListener('click',()=>{root.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);if(isLV){selectedCom=null;selectedAlgo=null;document.querySelectorAll('#cl-lv .comm-chip').forEach(function(c){c.classList.remove('sel');});document.getElementById('info-lv').style.display='none';if(lvNodes)lvNodes.attr('fill-opacity',0.75).attr('stroke-opacity',0.25);}apply();});
  root.querySelector('.btn-reset').addEventListener('click',()=>svg.transition().duration(400).call(d3.zoom().transform,d3.zoomIdentity));
  apply();

  // Communities: initLV handles tabs + highlight. Store ref for external access.
  if(isLV){
    lvNodes=nodes;
    nodes.on('click',function(e,d){
      const algo=document.querySelector('#sec-lv .tab-btn.active')?.dataset?.tab||'louvain';
      const comId=algo==='louvain'?d.louvain:d.leiden;
      if(comId!=='—'){
        const chip=document.querySelector('#cl-lv .comm-chip[data-com="'+comId+'"]');
        if(chip)chip.click();
      }
    });
  }
}

render('sec-pr','pagerank',prV);
render('sec-bw','betweenness',bwV);
render('sec-cl','closeness',clV);
render('sec-lv','pagerank',prV);

// === LV Community list (standalone, after render) ===
(function initLV(){
  const listEl=document.getElementById('cl-lv');
  const infoEl=document.getElementById('info-lv');
  if(!listEl||!infoEl){console.log('LV elements missing');return;}
  const lvColors=['#2a78d6','#1baf7a','#eda100','#008300','#4a3aa7','#e34948','#e87ba4','#eb6834'];
  const ldColors=['#e76f51','#2a9d8f','#e9c46a','#f4a261','#264653','#a8dadc','#457b9d','#6d597a'];
  var curAlgo='louvain';

  function computeStats(comKey){
    var groups={}, stats={};
    ND.forEach(function(d){
      var c=d[comKey];
      if(c===null||c===undefined||c==='—')return;
      if(!groups[c])groups[c]=[];
      groups[c].push(d);
    });
    // Collect topics per community
    var topics={};
    ND.forEach(function(d){
      var c=d[comKey];
      if(c===null||c===undefined||c==='—')return;
      if(!topics[c])topics[c]={};
      var tp=TP[d.id];
      if(tp){var tps=tp.split(', ').slice(0,3).join(', '); topics[c][tps]=(topics[c][tps]||0)+1;}
    });
    Object.keys(groups).forEach(function(cid){
      var m=groups[cid], n=m.length;
      var pctF=Math.round(100*m.filter(function(d){return d.female;}).length/n);
      var pctAlto=Math.round(100*m.filter(function(d){return d.gse==='Alto';}).length/n);
      var pctBajo=Math.round(100*m.filter(function(d){return d.gse==='Bajo';}).length/n);
      var q1vals=m.map(function(d){return d.pct_q1||0;}).filter(function(v){return v>0;});
      var avgQ1=q1vals.length?Math.round(q1vals.reduce(function(a,b){return a+b;},0)/q1vals.length):'—';
      // All topics sorted by frequency
      var allTopics=[];
      if(topics[cid]){
        allTopics=Object.entries(topics[cid]).sort(function(a,b){return b[1]-a[1];});
      }
      var top3=allTopics.slice(0,3).map(function(x){return x[0];}).join('<br>');
      var allList=allTopics.map(function(x){return x[0]+' <span style="color:var(--text-muted)">('+x[1]+')</span>';}).join('<br>');
      stats[cid]={n:n,pctF:pctF,pctAlto:pctAlto,pctBajo:pctBajo,avgQ1:avgQ1,top3:top3,allTopics:allList};
    });
    return stats;
  }

  function getIds(comKey){
    var ids={}, arr=[];
    ND.forEach(function(d){var c=d[comKey];if(c!==null&&c!==undefined&&c!=='—'&&!ids[c]){ids[c]=true;arr.push(c);}});
    return arr.sort(function(a,b){return a-b;});
  }

  function buildList(algo){
    var ids=getIds(algo);
    var stats=computeStats(algo);
    curAlgo=algo;
    listEl.innerHTML='';
    // Update node colors when switching tabs
    if(lvNodes){
      var colors=algo==='louvain'?lvColors:ldColors;
      lvNodes.attr('fill',function(d){
        var cid=algo==='louvain'?d.louvain:d.leiden;
        var idx=ids.indexOf(cid);
        return idx>=0?colors[idx%colors.length]:'#c3c2b7';
      });
      if(selectedCom){selectedCom=null;selectedAlgo=null;}
    }
    ids.forEach(function(cid){
      var s=stats[cid];
      if(!s)return;
      var chip=document.createElement('span');
      chip.className='comm-chip';
      chip.dataset.com=cid;
      chip.title=s.n+' fellows, '+s.pctF+'% F, Q1 '+s.avgQ1+'%';
      chip.textContent='C'+cid+' ('+s.n+')';
      chip.addEventListener('click',function(){
        listEl.querySelectorAll('.comm-chip').forEach(function(c){c.classList.remove('sel');});
        chip.classList.add('sel');
        selectedCom=cid; selectedAlgo=algo;
        infoEl.style.display='block';
        infoEl.innerHTML='<b>'+(algo==='louvain'?'Louvain':'Leiden')+' C'+cid+'</b>'
          +'<table>'
          +'<tr><td>Fellows</td><td><b>'+s.n+'</b></td><td>% Female</td><td><b>'+s.pctF+'%</b></td></tr>'
          +'<tr><td>% GSE Alto</td><td><b>'+s.pctAlto+'%</b></td><td>% GSE Bajo</td><td><b>'+s.pctBajo+'%</b></td></tr>'
          +'<tr><td>% Q1 papers</td><td colspan="3"><b>'+s.avgQ1+'%</b></td></tr>'
          +'<tr><td colspan="4" style="padding-top:4px;color:var(--text-muted)">Topics:</td></tr>'
          +'<tr><td colspan="4"><b style="font-size:10px">'+s.top3+'</b></td></tr>'
          +'</table>'
          +'<span class="topic-toggle" id="tog-'+cid+'">Show all topics</span>'
          +'<div class="topic-full" id="tfl-'+cid+'">'+s.allTopics+'</div>';
        // Topic toggle handler
        setTimeout(function(){
          var tog=document.getElementById('tog-'+cid);
          var tfl=document.getElementById('tfl-'+cid);
          if(tog&&tfl){
            tog.addEventListener('click',function(){
              if(tfl.classList.toggle('open')){
                tog.textContent='Hide topics';
              }else{
                tog.textContent='Show all topics';
              }
            });
          }
        },0);
        // Highlight in graph
        if(lvNodes){
          lvNodes.attr('fill-opacity',function(d){
            var v=algo==='louvain'?d.louvain:d.leiden;
            return v===cid?0.95:0.06;
          }).attr('stroke-opacity',function(d){
            var v=algo==='louvain'?d.louvain:d.leiden;
            return v===cid?0.6:0.03;
          });
        }
      });
      listEl.appendChild(chip);
    });
  }

  // Tab switcher — unifies with render + clears selection
  document.querySelectorAll('#sec-lv .tab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('#sec-lv .tab-btn').forEach(function(b){b.classList.remove('active');});
      this.classList.add('active');
      selectedCom=null; selectedAlgo=null;
      infoEl.style.display='none';
      if(lvNodes) lvNodes.attr('fill-opacity',0.75).attr('stroke-opacity',0.25);
      buildList(this.dataset.tab);
    });
  });

  buildList('louvain');
  console.log('LV ready');
})();

// Community stats
function computeCommStats(comKey){
  const groups={};
  ND.forEach(d=>{const c=d[comKey];if(c===null||c===undefined||c==='—')return;if(!groups[c])groups[c]=[];groups[c].push(d);});
  const stats={};
  Object.entries(groups).forEach(([cid,members])=>{
    const n=members.length;
    const pctF=Math.round(100*members.filter(d=>d.female).length/n);
    const pctAlto=Math.round(100*members.filter(d=>d.gse==='Alto').length/n);
    const pctBajo=Math.round(100*members.filter(d=>d.gse==='Bajo').length/n);
    const q1vals=members.map(d=>d.pct_q1||0).filter(v=>v>0);
    const avgQ1=q1vals.length?Math.round(q1vals.reduce((a,b)=>a+b,0)/q1vals.length):'—';
    stats[cid]={n,pctF,pctAlto,pctBajo,avgQ1};
  });
  return stats;
}
var lvStats=computeCommStats('louvain');
var ldStats=computeCommStats('leiden');

// (lvNodes declared at top of IIFE)

function showCommInfo(comId,algorithm){
  const stats=algorithm==='louvain'?lvStats:ldStats;
  const s=stats[comId];
  const infoEl=document.getElementById('info-lv');
  if(!s){infoEl.style.display='none';return;}
  infoEl.style.display='block';
  selectedLVComm=comId;
  infoEl.innerHTML=`<b>${algorithm==='louvain'?'Louvain':'Leiden'} C${comId}</b>
    <table>
    <tr><td>Fellows</td><td><b>${s.n}</b></td><td>% Female</td><td><b>${s.pctF}%</b></td></tr>
    <tr><td>% GSE Alto</td><td><b>${s.pctAlto}%</b></td><td>% GSE Bajo</td><td><b>${s.pctBajo}%</b></td></tr>
    <tr><td>% Q1 papers</td><td colspan="3"><b>${s.avgQ1}%</b></td></tr>
    </table>`;
  // Update chip selection (chips in .lv-extra section)
  document.querySelectorAll('#cl-lv .comm-chip').forEach(chip=>chip.classList.remove('sel'));
  const chip=document.querySelector(`#cl-lv .comm-chip[data-com="${comId}"]`);
  if(chip)chip.classList.add('sel');
  // Highlight community in graph
  if(lvNodes){
    lvNodes.attr('fill-opacity',d=>(d[algorithm]===comId)?0.95:0.08)
           .attr('stroke-opacity',d=>(d[algorithm]===comId)?0.6:0.03);
  }
}

function buildCommList(algorithm){
  const ids=algorithm==='louvain'?lvIds:ldIds;
  const stats=algorithm==='louvain'?lvStats:ldStats;
  const listEl=document.getElementById('cl-lv');
  if(!listEl)return;
  let h='';
  ids.forEach(cid=>{
    const s=stats[cid];
    if(s)h+=`<span class="comm-chip" data-com="${cid}" title="${s.n} fellows, ${s.pctF}% F, Q1 ${s.avgQ1}%">C${cid}<small> ${s.n}</small></span>`;
  });
  listEl.innerHTML=h;
  listEl.querySelectorAll('.comm-chip').forEach(chip=>{
    chip.addEventListener('click',function(){
      showCommInfo(parseInt(this.dataset.com),lvActiveTab);
    });
  });
}

function resetLVHighlight(){
  if(lvNodes){
    lvNodes.attr('fill-opacity',0.75).attr('stroke-opacity',0.25);
    document.querySelectorAll('#cl-lv .comm-chip').forEach(c=>c.classList.remove('sel'));
    const info=document.getElementById('info-lv');
    if(info)info.style.display='none';
    selectedLVComm=null;
  }
}

// Nav highlight
const navs=document.querySelectorAll('nav a');
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){navs.forEach(a=>a.classList.remove('active'));const m=document.querySelector(`nav a[href="#${e.target.id}"]`);if(m)m.classList.add('active');}});},{threshold:0.3});
document.querySelectorAll('.section').forEach(s=>obs.observe(s));
console.log('GDS Visualiser ready — '+ND.length+' nodes, '+LK.length+' edges');
})();
</script>
